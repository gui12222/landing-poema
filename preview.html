<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gui.poemas</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #141316 0%, #1f1c22 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    color: #f5efe8;
}

.container {
    width: 100%;
    max-width: 420px;
}

.card {
    background: rgba(28, 24, 30, 0.95);
    border-radius: 32px;
    padding: 40px 28px;
    text-align: center;
    box-shadow: 0 30px 60px rgba(0,0,0,0.6);
}

h1 {
    font-size: 1.9rem;
    line-height: 1.2;
    margin-bottom: 12px;
    font-weight: 600;
}

.subtitle {
    font-size: 0.9rem;
    opacity: 0.6;
    margin-bottom: 24px;
    letter-spacing: 1px;
}

.description {
    font-size: 1.05rem;
    line-height: 1.7;
    opacity: 0.85;
    margin-bottom: 36px;
}

.btn {
    display: inline-block;
    width: 100%;
    padding: 18px;
    border-radius: 50px;
    background: #d4a373;
    color: #111;
    font-weight: 600;
    font-size: 1.1rem;
    text-decoration: none;
    transition: 0.25s ease;
}

.btn:hover {
    transform: scale(1.03);
    background: #e6b583;
}

.footer {
    margin-top: 20px;
    font-size: 0.75rem;
    opacity: 0.4;
}
</style>
</head>

<body>
<div class="container">
    <div class="card">

        <h1>É difícil dizer adeus.</h1>

        <div class="subtitle">
            um poema sobre quem vai — e quem fica
        </div>

        <p class="description">
            “Tu és Clarice. Eu, Lispector.”<br><br>
            Um amor que nunca foi simples.  
            Um adeus que nunca foi leve.  
            E a pergunta que fica ecoando:
            quando é que tu voltas?
        </p>

        <a href="https://www.instagram.com/p/DVbJDXdDKnw/" 
           class="btn" 
           target="_blank">
           Assistir agora
        </a>

        <div class="footer">
            @gui.poemas • Instagram
        </div>

    </div>
</div>
</body>
</html>
